#The universal contract is done --- was hard to come up with but we did it --- 

robot:
  redis_namespace: "sai"
  prefix: "sim::franka"
  type: "sim"
  xml_path: "models/scene.xml"
  urdf_path: "models/fr3.urdf"
  data_sources:
    lowdim: #This could contain lowdim/force data
      fps: 30
      keys: 
        - eef_pos:
            redis: "haptic_commanded_position"
            obs_window: 2
            obs_dss : 3
            dim: [3]
        - eef_ori:
            redis: "haptic_commanded_orientation"
            obs_window: 2
            obs_dss : 3
            dim: [3, 3]
    visual: #This could contain rgb and depth data 
      fps: 30
      keys:
        - camera_01:
            type: "rgb"
            mujoco_camera_name: "wrist_camera"
            can: 0
            serial_number: 123456
            dim: [224, 224, 3]
            obs_window: 2
            obs_dss: 3
  action:
    dss: 3
    window: 8
    keys:
      robot_pos:
        source: eef_pos
      robot_ori:
        source: eef_ori
    mode: "relative"
